<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業股東盈餘分配計算系統 - 灰粉主題版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #1e293b; /* 深板岩灰背景 */
            --card-bg: #334155; /* 卡片灰色 */
            --accent-pink: #f472b6; /* 亮粉色 */
            --soft-pink: #fbcfe8; /* 淺粉色 */
            --text-main: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-image: radial-gradient(circle at top right, #334155, #1e293b);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(51, 65, 85, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 114, 182, 0.2);
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        .input-field {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #475569;
            color: white;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--accent-pink);
            outline: none;
            box-shadow: 0 0 8px rgba(244, 114, 182, 0.3);
        }
        .gray-pink-gradient {
            background: linear-gradient(to right, #cbd5e1, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-action {
            background: linear-gradient(135deg, #f472b6, #db2777);
            transition: all 0.3s;
        }
        .btn-action:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(244, 114, 182, 0.4);
        }
        table {
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        tr.table-row {
            background: rgba(71, 85, 105, 0.4);
            transition: transform 0.2s;
        }
        tr.table-row:hover {
            transform: scale(1.005);
            background: rgba(71, 85, 105, 0.6);
        }
        th {
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type=range] {
            accent-color: var(--accent-pink);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <div class="inline-block px-3 py-1 rounded bg-slate-700/50 border border-pink-500/20 text-pink-300 text-xs mb-4 tracking-tighter">
                FINANCIAL ANALYSIS TOOL
            </div>
            <h1 class="text-4xl font-bold gray-pink-gradient mb-2">股東盈餘分配計算系統</h1>
            <p class="text-slate-400"></p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Part 1: Earnings Foundation -->
            <section class="glass-card p-6">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <span class="w-2 h-6 bg-pink-500 mr-3 rounded"></span> 第一部分：盈餘基礎設定
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">本期稅前損益 (A)</label>
                        <input type="number" id="preTaxProfit" class="w-full input-field rounded-lg p-3" value="1000000" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">本期所得稅 (B)</label>
                        <input type="number" id="incomeTax" class="w-full input-field rounded-lg p-3" value="200000" oninput="calculateAll()">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">法定盈餘公積 (10%) (C)</label>
                        <div id="legalReserveDisp" class="p-3 bg-slate-900/50 rounded-lg text-pink-300 font-mono border border-slate-700">0</div>
                    </div>
                    <div class="pt-4 border-t border-slate-600">
                        <label class="block text-sm font-bold text-slate-200 mb-1">可供分配盈餘 (D = A - B - C)</label>
                        <div id="distributableEarnings" class="text-3xl font-bold text-white tracking-tight">0</div>
                    </div>
                </div>
            </section>

            <!-- Part 2: Tax Analysis -->
            <section class="glass-card p-6">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <span class="w-2 h-6 bg-slate-400 mr-3 rounded"></span> 第二部分：稅務負擔分析
                </h2>
                <div class="space-y-6">
                    <div class="bg-slate-900/40 p-4 rounded-xl border border-pink-500/10">
                        <h3 class="text-xs text-slate-400 mb-4 italic">※ 未分配盈餘稅金：(可分配盈餘 - 實際分配總額) × 5%</h3>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-sm text-slate-400">預計繳納之未分配盈餘稅</p>
                                <p class="text-2xl font-semibold text-pink-400" id="undistributedTax">NT$ 0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-slate-500 uppercase font-bold">Tax Rate 5%</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm text-slate-300">本次預計分配總額</label>
                            <span id="rangePercentText" class="text-xs text-pink-400">分配比例: 70%</span>
                        </div>
                        
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-500 font-medium">NT$</span>
                            <input type="number" id="distributionInput" class="w-full input-field rounded-lg p-3 pl-12 text-pink-200 font-bold text-lg" value="0" oninput="handleAmountInput(this.value)">
                        </div>
                        
                        <input type="range" id="distributionRange" min="0" max="100" value="70" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer" oninput="handleRangeInput(this.value)">
                        
                        <div class="flex justify-between text-xs text-slate-500 italic">
                            <span>0% (不分配)</span>
                            <span>100% (全額分配)</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Part 3: Shareholder List -->
        <section class="glass-card p-6 overflow-x-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold flex items-center">
                    <span class="w-2 h-6 bg-pink-400 mr-3 rounded"></span> 第三部分：股東分配名單及二代健保
                </h2>
                <button onclick="addShareholder()" class="btn-action text-white px-5 py-2 rounded-lg text-sm font-medium shadow-lg transition">新增股東</button>
            </div>
            
            <table class="w-full text-left">
                <thead>
                    <tr class="text-sm text-slate-400">
                        <th class="pb-4 px-2">股東名稱</th>
                        <th class="pb-4 px-2">持股比例 (%)</th>
                        <th class="pb-4 px-2">分配金額 (稅前)</th>
                        <th class="pb-4 px-2">二代健保 (2.11%)</th>
                        <th class="pb-4 px-2">實領金額</th>
                        <th class="pb-4 px-2 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="shareholderTable">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
            
            <div id="shareholderFooter" class="mt-4 p-4 bg-slate-900/30 rounded-xl flex justify-between items-center border border-dashed border-slate-700">
                <div class="text-sm text-slate-500 italic">
                    註：二代健保補充保費單筆達 NT$ 20,000 以上需扣費。
                </div>
                <div class="text-right">
                    <span class="text-slate-400 mr-4">分配比例加總: <span id="totalRatioText" class="font-mono text-pink-300">0%</span></span>
                    <span id="ratioWarning" class="text-rose-400 font-bold hidden px-2 py-1 bg-rose-900/20 rounded border border-rose-500/30">! 比例不等於 100%</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        const NHI_RATE = 0.0211;
        const NHI_THRESHOLD = 20000;
        const UNDISTRIBUTED_TAX_RATE = 0.05;

        let globalDistributable = 0;
        let isInternalUpdate = false;

        let shareholders = [
            { id: 1, name: '創始人 A', ratio: 60 },
            { id: 2, name: '投資人 B', ratio: 40 }
        ];

        function calculateAll() {
            const preTax = parseFloat(document.getElementById('preTaxProfit').value) || 0;
            const tax = parseFloat(document.getElementById('incomeTax').value) || 0;
            
            const afterTax = preTax - tax;
            const legalReserve = afterTax > 0 ? afterTax * 0.1 : 0;
            
            document.getElementById('legalReserveDisp').innerText = formatCurrency(legalReserve);
            
            globalDistributable = Math.max(0, afterTax - legalReserve);
            document.getElementById('distributableEarnings').innerText = formatCurrency(globalDistributable);
            
            if (!isInternalUpdate) {
                const ratio = parseInt(document.getElementById('distributionRange').value);
                const amount = Math.round(globalDistributable * (ratio / 100));
                document.getElementById('distributionInput').value = amount;
                updateView(amount, ratio);
            }
        }

        function handleAmountInput(val) {
            isInternalUpdate = true;
            const amount = parseFloat(val) || 0;
            const ratio = globalDistributable > 0 ? Math.min(100, (amount / globalDistributable) * 100) : 0;
            
            document.getElementById('distributionRange').value = ratio;
            updateView(amount, ratio);
            isInternalUpdate = false;
        }

        function handleRangeInput(val) {
            isInternalUpdate = true;
            const ratio = parseFloat(val) || 0;
            const amount = Math.round(globalDistributable * (ratio / 100));
            
            document.getElementById('distributionInput').value = amount;
            updateView(amount, ratio);
            isInternalUpdate = false;
        }

        function updateView(totalDistAmount, ratio) {
            document.getElementById('rangePercentText').innerText = `分配比例: ${Math.round(ratio)}%`;
            const remaining = Math.max(0, globalDistributable - totalDistAmount);
            const undistTax = remaining * UNDISTRIBUTED_TAX_RATE;
            document.getElementById('undistributedTax').innerText = formatCurrency(undistTax);
            renderTable(totalDistAmount);
        }

        function renderTable(totalDistAmount) {
            const tbody = document.getElementById('shareholderTable');
            tbody.innerHTML = '';
            let totalRatio = 0;

            shareholders.forEach((s, index) => {
                totalRatio += s.ratio;
                const distAmount = totalDistAmount * (s.ratio / 100);
                const nhi = distAmount >= NHI_THRESHOLD ? Math.round(distAmount * NHI_RATE) : 0;
                const netAmount = distAmount - nhi;

                const tr = document.createElement('tr');
                tr.className = 'table-row text-sm';
                tr.innerHTML = `
                    <td class="py-3 px-2">
                        <input type="text" value="${s.name}" onchange="updateShareholder(${index}, 'name', this.value)" class="bg-transparent border-b border-slate-600 focus:border-pink-400 outline-none w-full text-slate-100">
                    </td>
                    <td class="py-3 px-2">
                        <input type="number" value="${s.ratio}" onchange="updateShareholder(${index}, 'ratio', this.value)" class="bg-transparent border-b border-slate-600 focus:border-pink-400 outline-none w-14 text-slate-100"> %
                    </td>
                    <td class="py-3 px-2 font-mono text-slate-300">${formatCurrency(distAmount)}</td>
                    <td class="py-3 px-2 font-mono text-pink-300/80">${formatCurrency(nhi)}</td>
                    <td class="py-3 px-2 font-mono font-bold text-pink-100">${formatCurrency(netAmount)}</td>
                    <td class="py-3 px-2 text-center">
                        <button onclick="removeShareholder(${index})" class="text-slate-500 hover:text-rose-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalRatioText').innerText = `${totalRatio}%`;
            const warning = document.getElementById('ratioWarning');
            if(totalRatio !== 100) {
                warning.classList.remove('hidden');
            } else {
                warning.classList.add('hidden');
            }
        }

        function updateShareholder(index, field, value) {
            if(field === 'ratio') value = parseFloat(value) || 0;
            shareholders[index][field] = value;
            calculateAll();
        }

        function addShareholder() {
            shareholders.push({ id: Date.now(), name: '新股東', ratio: 0 });
            calculateAll();
        }

        function removeShareholder(index) {
            shareholders.splice(index, 1);
            calculateAll();
        }

        function formatCurrency(num) {
            return 'NT$ ' + Math.round(num).toLocaleString();
        }

        window.onload = calculateAll;
    </script>
</body>
</html>
